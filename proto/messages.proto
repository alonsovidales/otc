syntax = "proto3";

import "google/protobuf/timestamp.proto";

package msg;

option go_package = "github.com/alonsovidales/otc/proto/generated;msg";

enum ErrorCode {
  Unknown = 0;
}

message GetStatus {
}

message Status {
  bool online = 1;
  int32  local_ip = 2;
  int32  nas_status = 3;
  int32  disks = 4;
  repeated ErrorCode  error_codes = 5;
}

message Auth {
  string uuid = 1;
  string key = 2;
  bool create = 3;
}

message UploadFile {
  string path = 1;
  bytes content = 2;
  bool forceOverride = 3;
}

message DelFile {
  string path = 1;
}

message GetFile {
  string path = 1;
}

message ListFiles {
  bool globbing = 1;
  string path = 2;
}

message ListOfFiles {
  repeated File files = 1;
}

message FileTag {
  string tag = 1;
  string type = 2;
}

message File {
  string hash = 1;
  string mime = 2;
  google.protobuf.Timestamp created = 3;
  google.protobuf.Timestamp modified = 4;
  string path = 5;
  int32 size = 6;
  repeated FileTag tags = 7;
  optional bytes content = 8;
}

message Ack {
  bool ok = 1;
}

message ReqEnvelope {
  int32 id = 1;
  oneof payload {
    ListFiles req_list_files = 10;
    GetStatus req_get_status = 11;
    Auth req_auth = 12;
    UploadFile req_upload_file = 13;
    GetFile req_get_file = 14;
    DelFile req_del_file = 15;
  }
}

message RespEnvelope {
  int32 id = 1;
  bool error = 2;
  optional string error_message = 3;
  oneof payload {
    Status resp_status = 10;
    Ack resp_ack = 11;
    File resp_file = 12;
    ListOfFiles resp_list_of_files = 13;
  }
}
