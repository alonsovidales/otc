syntax = "proto3";

import "google/protobuf/timestamp.proto";

package msg;

option go_package = "github.com/alonsovidales/otc/proto/generated;msg";

enum StatusErrorCode {
  DiskError = 0;
  Syncing = 1;
  MissingDisk = 2;
  ErrorInDisk = 3;
}

message StatusErrors {
  StatusErrorCode StatusErrorCode = 1;
  string Message = 2;
}

message GetStatus {
}

message Status {
  bool online = 1;
  string  local_ip = 2;
  int32  disks = 3;
  repeated StatusErrors  errors = 4;
  int32  raid_size = 5;
  int32  raid_usage = 6;
  int32  disk_size = 7;
  int32  disk_usage = 8;
  float  cpu_usage_prc = 9;
  int32  mem_size = 10;
  int32  mem_usage = 11;
}

message Auth {
  string uuid = 1;
  string key = 2;
  bool create = 3;
}

message UploadFile {
  string path = 1;
  bytes content = 2;
  bool forceOverride = 3;
  google.protobuf.Timestamp created = 4;
}

message DelFile {
  string path = 1;
}

message GetFile {
  string path = 1;
}

message ListFiles {
  string path = 1;
}

message SearchPhotos {
  repeated string tags = 1;
}

message ListOfFiles {
  repeated File files = 1;
}

message File {
  string hash = 1;
  string mime = 2;
  google.protobuf.Timestamp created = 3;
  google.protobuf.Timestamp modified = 4;
  string path = 5;
  int32 size = 6;
  optional bytes content = 8;
  repeated float embedding = 9;
}

message Ack {
  bool ok = 1;
  string error_msg = 2;
}

message GetTags {
}

message TagsList {
  repeated string tags = 1;
}

message ChangeKey {
  string old_key = 1;
  string new_key = 2;
}

message NewSocialPublication {
  string text = 1;
  repeated string images_hash = 2;
}

message GetSocialPublications {
  google.protobuf.Timestamp since = 1;
  int32 total = 2;
}

message NewSocialComment {
  string pub_uuid = 1;
  string comment = 2;
  string publisher = 3;
}

message DelSocialComment {
  string comment_uuid = 1;
}

message FriendshipRequest {
}

message FriendshipAck {
  string req_uuid = 1;
  bool accept = 2;
}

message LikePublication {
  string pub_uuid = 1;
}

message LikeComment {
  string comment_uuid = 1;
}

enum ActionType {
  FriendshipReq = 0;
  LikePub = 1;
  LikeComm = 2;
  NewSocialComm = 3;
}

message DidSendAction {
  string action_uuid = 1;
  string target = 2;
  ActionType action_type = 3;
}

message GetSettings {
}

message SetSettings {
  string domain = 1;
}

message Settings {
  string domain = 1;
}

message BridgeRegister {
  string owner_uuid = 1;
  string domain = 2;
  string secret = 3;
}

enum BridgeOnboardErrorType {
  generic_error = 0;
  taken_domain = 1;
  secret_missmatch = 2;
  unknown_owner = 3;
  pending_approval = 4;
}

message BridgeAckOnboard {
  bool ok = 1;
}

message ReqEnvelope {
  int32 id = 1;
  oneof payload {
    ListFiles req_list_files = 10;
    GetStatus req_get_status = 11;
    Auth req_auth = 12;
    UploadFile req_upload_file = 13;
    GetFile req_get_file = 14;
    DelFile req_del_file = 15;
    SearchPhotos req_search_photos = 16;
    GetTags req_get_tags = 17;
    ChangeKey req_change_key = 18;

    NewSocialPublication req_new_social_publication = 19;
    GetSocialPublications req_get_social_publications = 20;
    NewSocialComment req_new_social_comment = 21;
    DelSocialComment req_del_social_comment = 22;
    FriendshipRequest req_friendship_request = 23;
    FriendshipAck req_friendship_ack = 24;
    LikePublication req_like_publication = 25;
    LikeComment req_like_comment = 26;
    DidSendAction req_did_send_action = 27;
    GetSettings req_get_settings = 28;
    SetSettings req_set_settings = 29;

    BridgeRegister req_bridge_register = 30;
  }
}

message RespEnvelope {
  int32 id = 1;
  bool error = 2;
  string error_message = 3;
  oneof payload {
    Status resp_status = 10;
    Ack resp_ack = 11;
    File resp_file = 12;
    ListOfFiles resp_list_of_files = 13;
    TagsList resp_tags_list = 14;
    Settings resp_settings = 15;

    BridgeAckOnboard resp_bridge_ack_onboard = 16;
  }
}
