syntax = "proto3";

import "google/protobuf/timestamp.proto";

package msg;

option go_package = "github.com/alonsovidales/otc/proto/generated;msg";

enum StatusErrorCode {
  DiskError = 0;
  Syncing = 1;
  MissingDisk = 2;
  ErrorInDisk = 3;
}

message StatusErrors {
  StatusErrorCode StatusErrorCode = 1;
  string Message = 2;
}

message GetStatus {
}

message Status {
  bool online = 1;
  string  local_ip = 2;
  int32  disks = 3;
  repeated StatusErrors  errors = 4;
  int32  raid_size = 5;
  int32  raid_usage = 6;
  int32  disk_size = 7;
  int32  disk_usage = 8;
  float  cpu_usage_prc = 9;
  int32  mem_size = 10;
  int32  mem_usage = 11;
}

message Auth {
  string uuid = 1;
  string key = 2;
  bool create = 3;
}

message UploadFile {
  string path = 1;
  bytes content = 2;
  bool forceOverride = 3;
  google.protobuf.Timestamp created = 4;
}

message DelFile {
  string path = 1;
}

message GetFile {
  string path = 1;
}

message ListFiles {
  string path = 1;
  bool recursive = 2;
}

message SearchPhotos {
  repeated string tags = 1;
  string token = 2;
}

message ListOfFiles {
  repeated File files = 1;
  string token = 2;
}

message File {
  string hash = 1;
  string mime = 2;
  google.protobuf.Timestamp created = 3;
  google.protobuf.Timestamp modified = 4;
  string path = 5;
  int32 size = 6;
  optional bytes content = 8;
}

message Ack {
  bool ok = 1;
  string error_msg = 2;
}

message GetTags {
}

message TagsList {
  repeated string tags = 1;
}

message ChangeKey {
  string old_key = 1;
  string new_key = 2;
}

message NewSocialPublication {
  string text = 1;
  repeated string paths = 2;
}

message GetSocialPublications {
  google.protobuf.Timestamp since = 1;
  int32 total = 2;
  repeated string exclude_uuids = 3;
}

message NewSocialComment {
  string pub_uuid = 1;
  string comment = 2;
  string publisher = 3;
}

message DelSocialComment {
  string comment_uuid = 1;
}

message DidSendFriendshipReq {
  string secret = 1;
  string domain = 2;
}

message Friendship {
  Profile origin_profile = 2;
  FriendShipStatus status = 3;
  bool sent = 4;
  string secret = 5;
}

message Friendships {
  repeated Friendship friendships = 1;
}

message FriendshipsList {
}

message FriendshipRequest {
  string domain = 1;
}

message FriendshipInterRequest {
  string domain = 1;
  string secret = 2;
  Profile origin_profile = 3;
}

enum FriendShipStatus {
  Pending = 0;
  Accepted = 1;
  Blocked = 2;
}

message ChangeFriendStatus {
  string domain = 1;
  FriendShipStatus status = 2;
}

message LikePublication {
  string pub_uuid = 1;
}

message LikeComment {
  string comment_uuid = 1;
}

enum ActionType {
  FriendshipReq = 0;
  LikePub = 1;
  LikeComm = 2;
  NewSocialComm = 3;
}

message GetSettings {
}

message SetSettings {
  string domain = 1;
}

message Settings {
  string domain = 1;
}

message BridgeRegister {
  string owner_uuid = 1;
  string domain = 2;
  string secret = 3;
}

enum BridgeOnboardErrorType {
  generic_error = 0;
  taken_domain = 1;
  secret_missmatch = 2;
  unknown_owner = 3;
  pending_approval = 4;
}

message BridgeAckOnboard {
  bool ok = 1;
}

message GetProfile {
}

message Profile {
  string name = 1;
  optional bytes image = 2;
  string text = 3;
  string domain = 4;
}

message ShareFilesLink {
  repeated string paths = 1;
}

message ShareLink {
  string link = 1;
}

message DownloadSharedLink {
  string uuid = 1;
  string secret = 2;
}

message NewSocial {
  string uuid = 1;
}

message SharedFiles {
  bytes content = 1;
}

message Comment {
  string pub_uuid = 1;
  string comment_uuid = 2;
  string comment = 3;
  string publisher = 4;
  int32 likes = 5;
  google.protobuf.Timestamp date_time = 6;
}

message SocialPublication {
  string uuid = 1;
  string text = 2;
  repeated File files = 3;
  repeated Comment comments = 4;
  int32 likes = 5;
  Profile publisher = 7;
}

message SocialPublications {
  repeated SocialPublication publications = 1;
  google.protobuf.Timestamp since = 2;
}

message GetFriendshipStatus {
  string domain = 1;
  string secret = 2;
}

message FriendshipStatus {
  FriendShipStatus status = 1;
}

message AuthAsFriend {
  string domain = 1;
  string secret = 2;
}

message ReqEnvelope {
  int32 id = 1;
  oneof payload {
    ListFiles req_list_files = 10;
    GetStatus req_get_status = 11;
    Auth req_auth = 12;
    UploadFile req_upload_file = 13;
    GetFile req_get_file = 14;
    DelFile req_del_file = 15;
    SearchPhotos req_search_photos = 16;
    GetTags req_get_tags = 17;
    ChangeKey req_change_key = 18;
    GetSettings req_get_settings = 28;
    SetSettings req_set_settings = 29;
    NewSocialPublication req_new_social_publication = 19;
    GetSocialPublications req_get_social_publications = 20;
    FriendshipRequest req_friendship_request = 23;
    FriendshipInterRequest req_friendship_inter_request = 37;
    DidSendFriendshipReq req_did_send_friendship_req = 38;
    FriendshipsList req_friendships_list = 35;
    ChangeFriendStatus req_change_friend_status = 36;
    GetFriendshipStatus req_get_friendship_status = 39;
    AuthAsFriend req_auth_as_friend = 40;
    NewSocialComment req_new_social_comment = 21;

    DelSocialComment req_del_social_comment = 22;
    LikePublication req_like_publication = 25;
    LikeComment req_like_comment = 26;

    BridgeRegister req_bridge_register = 30;
    GetProfile req_get_profile = 31;
    Profile req_set_profile = 32;
    ShareFilesLink req_share_files_link = 33;
    DownloadSharedLink req_download_shared_link = 34;
  }
}

message RespEnvelope {
  int32 id = 1;
  bool error = 2;
  string error_message = 3;
  oneof payload {
    Status resp_status = 10;
    Ack resp_ack = 11;
    File resp_file = 12;
    ListOfFiles resp_list_of_files = 13;
    TagsList resp_tags_list = 14;
    Settings resp_settings = 15;
    BridgeAckOnboard resp_bridge_ack_onboard = 16;
    Profile resp_profile = 17;
    ShareLink resp_share_link = 18;
    Friendships resp_friendships = 19;
    SharedFiles resp_shared_files = 20;
    NewSocial resp_new_social = 21;
    FriendshipStatus resp_friendship_status = 23;
    SocialPublications resp_social_publications = 22;
  }
}
