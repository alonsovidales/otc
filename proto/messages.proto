syntax = "proto3";

import "google/protobuf/timestamp.proto";

package msg;

option go_package = "github.com/alonsovidales/otc/proto/generated;msg";

enum StatusErrorCode {
  DiskError = 0;
  Syncing = 1;
  MissingDisk = 2;
  ErrorInDisk = 3;
}

message StatusErrors {
  StatusErrorCode StatusErrorCode = 1;
  string Message = 2;
}

message GetStatus {
}

message Status {
  bool online = 1;
  string  local_ip = 2;
  int32  disks = 3;
  repeated StatusErrors  errors = 4;
  int32  raid_size = 5;
  int32  raid_usage = 6;
  int32  disk_size = 7;
  int32  disk_usage = 8;
  float  cpu_usage_prc = 9;
  int32  mem_size = 10;
  int32  mem_usage = 11;
}

message Auth {
  string uuid = 1;
  string key = 2;
  bool create = 3;
}

message UploadFile {
  string path = 1;
  bytes content = 2;
  bool forceOverride = 3;
}

message DelFile {
  string path = 1;
}

message GetFile {
  string path = 1;
}

message ListFiles {
  string path = 1;
}

message SearchPhotos {
  string text = 1;
}

message ListOfFiles {
  repeated File files = 1;
}

message File {
  string hash = 1;
  string mime = 2;
  google.protobuf.Timestamp created = 3;
  google.protobuf.Timestamp modified = 4;
  string path = 5;
  int32 size = 6;
  optional bytes content = 8;
  repeated float embedding = 9;
}

message Ack {
  bool ok = 1;
  string error_msg = 2;
}

message ReqEnvelope {
  int32 id = 1;
  oneof payload {
    ListFiles req_list_files = 10;
    GetStatus req_get_status = 11;
    Auth req_auth = 12;
    UploadFile req_upload_file = 13;
    GetFile req_get_file = 14;
    DelFile req_del_file = 15;
    SearchPhotos req_search_photos = 16;
  }
}

message RespEnvelope {
  int32 id = 1;
  bool error = 2;
  string error_message = 3;
  oneof payload {
    Status resp_status = 10;
    Ack resp_ack = 11;
    File resp_file = 12;
    ListOfFiles resp_list_of_files = 13;
  }
}
